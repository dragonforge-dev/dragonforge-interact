[plugin]

name="Dragonforge Interact"
description="A Godot plugin that adds Interact and Highlight nodes that can be used to make RigidBody3D, StaticBody3D and MeshInstance3D nodes interactive with the mouse. Also includes InteractionRayCast3D and InteractionShapeCast3D as well as a Corsshair control that can be used to interact in a 1st or 3rd person game that captures the mouse."
author="Dragonforge Development"
version="1.2"
script="plugin.gd"
